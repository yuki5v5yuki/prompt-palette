name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run tauri:build

      - uses: actions/upload-artifact@v4
        if: matrix.label == 'windows'
        with:
          name: prompt-palette-windows-unsigned
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - uses: actions/upload-artifact@v4
        if: matrix.label == 'macos'
        with:
          name: prompt-palette-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

  sign-windows:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download unsigned Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: prompt-palette-windows-unsigned
          path: ./unsigned

      - name: Repackage for signing
        run: |
          mkdir -p ./to-sign
          cp ./unsigned/**/*.msi ./to-sign/ 2>/dev/null || true
          cp ./unsigned/**/*.exe ./to-sign/ 2>/dev/null || true
          # Fallback: files might be at root level
          cp ./unsigned/*.msi ./to-sign/ 2>/dev/null || true
          cp ./unsigned/*.exe ./to-sign/ 2>/dev/null || true

      - name: Upload artifact for SignPath
        id: upload-for-signing
        uses: actions/upload-artifact@v4
        with:
          name: prompt-palette-windows-to-sign
          path: ./to-sign/

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ vars.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "prompt-palette"
          signing-policy-slug: "release-signing"
          github-artifact-id: "${{ steps.upload-for-signing.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "./signed"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prompt-palette-windows-signed
          path: ./signed/
