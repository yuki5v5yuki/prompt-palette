name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - run: npm run tauri:build

      - uses: actions/upload-artifact@v4
        if: matrix.label == 'windows'
        with:
          name: prompt-palette-windows-unsigned
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - uses: actions/upload-artifact@v4
        if: matrix.label == 'macos'
        with:
          name: prompt-palette-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

  sign-windows:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download unsigned Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: prompt-palette-windows-unsigned
          path: ./unsigned

      - name: Repackage for signing
        run: |
          mkdir -p ./to-sign
          cp ./unsigned/**/*.msi ./to-sign/ 2>/dev/null || true
          cp ./unsigned/**/*.exe ./to-sign/ 2>/dev/null || true
          # Fallback: files might be at root level
          cp ./unsigned/*.msi ./to-sign/ 2>/dev/null || true
          cp ./unsigned/*.exe ./to-sign/ 2>/dev/null || true

      - name: Upload artifact for SignPath
        id: upload-for-signing
        uses: actions/upload-artifact@v4
        with:
          name: prompt-palette-windows-to-sign
          path: ./to-sign/

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ vars.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "prompt-palette"
          signing-policy-slug: "release-signing"
          github-artifact-id: "${{ steps.upload-for-signing.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "./signed"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prompt-palette-windows-signed
          path: ./signed/

  build-msix:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: prompt-palette-windows-unsigned
          path: ./unsigned

      - name: Find MSI file
        id: find-msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path ./unsigned -Recurse -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { Write-Error "MSI not found"; exit 1 }
          echo "MSI_PATH=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Found MSI: $($msi.FullName)"

      - name: Generate MSIX assets
        shell: pwsh
        run: |
          pip install Pillow
          python msix/generate-assets.py

      - name: Resolve MSIX version from tauri.conf.json
        id: msixver
        shell: pwsh
        run: |
          $json = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $segments = [string[]]($json.version -split '\.')
          while ($segments.Count -lt 4) { $segments += '0' }
          $four = ($segments[0..3] -join '.')
          Add-Content -Path $env:GITHUB_OUTPUT -Value "MSIX_VERSION=$four"
          Write-Host "MSIX_VERSION=$four"

      - name: Build MSIX package
        shell: pwsh
        run: |
          ./msix/build-msix.ps1 `
            -MsiPath "${{ steps.find-msi.outputs.MSI_PATH }}" `
            -OutputPath "PromptPalette.msix" `
            -Version "${{ steps.msixver.outputs.MSIX_VERSION }}" `
            -Publisher "${{ vars.MSIX_PUBLISHER || 'CN=C04C86FA-F1E0-40B1-8499-E5BF7245F317' }}"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-palette-msix
          path: PromptPalette.msix
